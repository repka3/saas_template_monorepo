services:
  postgres:
    image: postgres:17
    container_name: saas-template-postgres-localhost
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d saas_template']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - saas-template-postgres-localhost:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: saas-template-mailpit-localhost
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  saas-template-postgres-localhost:
